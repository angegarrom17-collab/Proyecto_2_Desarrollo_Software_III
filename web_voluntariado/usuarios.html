<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }

        /* Sidebar: Solo la imagen */
        .sidebar { width: 260px; background-color: #0d47a1; display: flex; flex-direction: column; }

        /* Imagen que abarca todo el alto del sidebar */
        .sidebar-full-img {
            width: 100%;
            height: 100%; /* Esto hace que la imagen ocupe todo el espacio vertical del bloque azul */
            object-fit: cover;
            display: block;
        }

        /* Contenido Principal */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header-actions { background: white; padding: 15px 30px; display: flex; justify-content: flex-end; gap: 10px; border-bottom: 1px solid #ddd; }
        .btn-top { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 14px; }
        .btn-blue { background: #0d47a1; color: white; border: none; }
        .content-area { padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #1976d2; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="img/FARO.png" alt="Faro" class="sidebar-full-img">
    </div>

    <div class="main-content">
        <div class="header-actions">
            <button class="btn-top btn-blue">+ Registrar</button>
            <button class="btn-top">✏️ Editar</button>
            <button class="btn-top">🔍 Limpiar</button>
            <button class="btn-top">🚪 Salir</button>
        </div>

        <div class="content-area">
            <h2>Gestión de Usuarios</h2>

            <div class="card">
                <div class="form-row">
                    <div><label>ID</label><input type="text" placeholder="Ingrese el ID"></div>
                    <div><label>Nombre</label><input type="text" placeholder="Ingrese el nombre"></div>
                    <div><label>Correo</label><input type="text" placeholder="Ingrese el correo"></div>
                </div>
            </div>

            <div class="card">
                <h3>Usuarios registrados</h3>
                <table>
                    <thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Tipo</th></tr></thead>
                    <tbody>
                        <tr><td>11937</td><td>Angelica</td><td>ang@mail.com</td><td>Encargado</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
