<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="main-container">
    <h2>Gestión de Usuarios</h2>

    <div class="form-section">
        <input type="text" placeholder="ID">
        <input type="text" placeholder="NOMBRE COMPLETO">
        <input type="text" placeholder="CORREO ELECTRÓNICO">
        <input type="password" placeholder="CONTRASEÑA">
        <input type="text" placeholder="TIPO DE USUARIO">

        <div class="btn-group">
            <button class="action-btn">Registrar</button>
            <button class="action-btn">Editar</button>
            <button class="action-btn">Limpiar</button>
            <button class="action-btn">Salir</button>
        </div>
    </div>

    <h3>USUARIOS REGISTRADOS</h3>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Tipo</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>11937</td>
                <td>angelica</td>
                <td>angeee@gmail.com</td>
                <td>encargado</td>
            </tr>
        </tbody>
    </table>
    <button class="delete-btn">Borrar por ID</button>
</div>

</body>
</html>
