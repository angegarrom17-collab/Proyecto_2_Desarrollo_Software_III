<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Protección del Mar</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<base target="_blank">
</head>
<body>

    <div class="login-container">
        <div class="login-logo">🐢</div>
        <h1 class="login-title">Protejamos Nuestro Mar</h1>
        <p class="login-subtitle">Inicia sesión para continuar</p>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>

        <p class="error-msg" id="errorMsg">Correo o contraseña incorrectos</p>

        <p class="footer-text"><span>🌊</span> Sistema de monitoreo costero</p>
    </div>

    <script src="assets/js/login.js"></script>

</body>
</html>
