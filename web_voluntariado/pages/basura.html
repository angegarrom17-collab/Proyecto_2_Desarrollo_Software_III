<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basura Recolectada - Sistema de Monitoreo Costero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="../assets/css/basura.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <span class="icono-badge-header">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
                    <path d="M9 2c-.55 0-1 .45-1 1v1H5.5a1 1 0 000 2H6l1.1 13.2A2 2 0 009.1 21h5.8a2 2 0 002-1.8L18 6h.5a1 1 0 000-2H16V3c0-.55-.45-1-1-1H9zm1 2h4v1h-4V4zm-1.4 5h1.1l.4 9H9.6l-.4-9h.4zm3.2 0h1.6l-.4 9h-1.6l.4-9z"/>
                </svg>
            </span>
            <div>
                <h1>Basura Recolectada</h1>
                <p>Sistema de monitoreo costero · Módulo de residuos</p>
            </div>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Registrar
            </button>
            <button id="btnEditar" class="btn-secundario">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Editar
            </button>
            <button id="btnLimpiar" class="btn-outline">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.36 2.72l1.42 1.42-5.72 5.71c1.19 1.61 1.63 3.6 1.19 5.48l-8.09-8.09c1.88-.44 3.87 0 5.48 1.19l5.72-5.71M5.93 17.57c-2.01-2.01-3.24-4.41-3.87-6.57l3.15-3.16 8.09 8.09-3.16 3.15c-2.16-.63-4.56-1.86-6.57-3.87l2.36-2.36-.94-.94-2.06-.34z"/></svg>
                Limpiar
            </button>
            <button id="btnBorrar" class="btn-borrar-id">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Borrar
            </button>
            <button id="btnSalir" class="btn-outline">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 17v-3H3v-4h7V7l5 5-5 5zM10 3H5a2 2 0 00-2 2v3h2V5h5V3z"/></svg>
                Salir
            </button>
        </div>
    </header>

    <main class="contenedor">
        <section class="formulario">
            <div class="formulario-titulo">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 2c-.55 0-1 .45-1 1v1H5.5a1 1 0 000 2H6l1.1 13.2A2 2 0 009.1 21h5.8a2 2 0 002-1.8L18 6h.5a1 1 0 000-2H16V3c0-.55-.45-1-1-1H9z"/></svg>
                Datos del residuo
            </div>
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_tipo">
                        <svg class="icono-label" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M9 2c-.55 0-1 .45-1 1v1H5.5a1 1 0 000 2H6l1.1 13.2A2 2 0 009.1 21h5.8a2 2 0 002-1.8L18 6h.5a1 1 0 000-2H16V3c0-.55-.45-1-1-1H9zm1 2h4v1h-4V4z"/></svg>
                        Tipo de residuo
                    </label>
                    <input type="text" id="entry_tipo" placeholder="Ej: vidrio, plástico, red">
                </div>
                <div class="campo">
                    <label for="entry_peso">
                        <svg class="icono-label" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a4 4 0 00-4 4c0 1.14.48 2.16 1.24 2.9L6.4 20.7A1 1 0 007.36 22h9.28a1 1 0 00.96-1.3L14.76 8.9A4 4 0 0016 6a4 4 0 00-4-4zm0 2a2 2 0 012 2 2 2 0 01-2 2 2 2 0 01-2-2 2 2 0 012-2z"/></svg>
                        Peso (kg)
                    </label>
                    <input type="text" id="entry_peso" placeholder="Peso en kilos">
                </div>
                <div class="campo">
                    <label for="entry_fecha">
                        <svg class="icono-label" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V3a1 1 0 00-2 0v1H8V3a1 1 0 00-2 0v1H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg>
                        Fecha
                    </label>
                    <input type="text" id="entry_fecha" placeholder="DD-MM">
                </div>
            </div>
        </section>

        <div class="separador"></div>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2>
                    <span class="icono-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M20 8H4a2 2 0 00-2 2v8a2 2 0 002 2h16a2 2 0 002-2v-8a2 2 0 00-2-2zm-9 7H6v-2h5v2zm7-3h-7v-2h7v2zM7 7V5a2 2 0 012-2h6a2 2 0 012 2v2h-2V5H9v2H7z"/></svg>
                    </span>
                    Registros de basura
                </h2>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaBasura">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tipo de Residuo</th>
                            <th>Peso (kg)</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyBasura">

                    </tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla"</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/auth-guard.js"></script>
</body>
</html>
