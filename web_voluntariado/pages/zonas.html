<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Zonas - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/zonas.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-water"></i> <span>Sistema de Monitoreo Costero</span></h2>
        </div>
        <div class="sidebar-footer">
            <i class="fas fa-anchor" style="font-size: 40px; opacity: 0.3;"></i>
        </div>
    </aside>

    <main class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <div>
                <h1>Gestión de Zonas</h1>
                <p>Sistema de monitoreo costero · Módulo de zonas</p>
            </div>
            <div class="topbar-actions">
                <button id="btnRegistrar" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Registrar
                </button>
                <button id="btnEditar" class="btn btn-secondary">
                    <i class="fas fa-edit"></i> Editar
                </button>
                <button id="btnLimpiar" class="btn btn-secondary">
                    <i class="fas fa-eraser"></i> Limpiar
                </button>
                <button id="btnSalir" class="btn btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </div>

        <!-- Card: Información de la zona -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-map-marker-alt" style="color: #5BC0A8;"></i>
                Información de la zona
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> ID Zona</label>
                    <input type="text" id="entry_id" placeholder="Número entero">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Nombre</label>
                    <input type="text" id="entry_nombre" placeholder="Nombre de la zona">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> Ubicación</label>
                    <input type="text" id="entry_ubicacion" placeholder="Ubicación">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-bar"></i> Nivel de contaminación</label>
                    <input type="text" id="entry_nivel" placeholder="bajo / medio / alto / critico">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <input type="text" id="entry_descripcion" placeholder="Descripción de la zona">
                </div>
            </div>
        </div>

        <!-- Card: Tabla de zonas -->
        <div class="card">
            <div class="table-header">
                <h3><i class="fas fa-list" style="color: #5BC0A8; margin-right: 8px;"></i>Zonas registradas</h3>
                <div class="search-box">
                    <button id="btnBuscar" class="btn btn-success">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button id="btnBorrar" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Borrar por ID
                    </button>
                </div>
            </div>

            <table id="tablaZonas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Contaminación</th>
                    </tr>
                </thead>
                <tbody id="tbodyZonas">
                </tbody>
            </table>

            <p id="lblFooter" class="footer-tabla">Mostrando 0 zona(s) registrada(s)</p>
        </div>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/zonas.js"></script>
</body>
</html>
