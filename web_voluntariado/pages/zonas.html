<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Zonas - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/zonas.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <div class="titulo-con-icono">
                <span class="icono-titulo">📍</span>
                <div>
                    <h1>Gestión de Zonas</h1>
                    <p>Sistema de monitoreo costero · Módulo de zonas</p>
                </div>
            </div>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">
                <i class="fas fa-plus"></i> Registrar
            </button>
            <button id="btnEditar" class="btn-secundario">
                <i class="fas fa-edit"></i> Editar
            </button>
            <button id="btnLimpiar" class="btn-outline">
                <i class="fas fa-eraser"></i> Limpiar
            </button>
            <button id="btnSalir" class="btn-outline">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <main class="contenedor">
        <section class="formulario card">
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id"><i class="fas fa-hashtag"></i> ID Zona</label>
                    <input type="text" id="entry_id" placeholder="Número entero">
                </div>
                <div class="campo">
                    <label for="entry_nombre"><i class="fas fa-tag"></i> Nombre</label>
                    <input type="text" id="entry_nombre" placeholder="Nombre de la zona">
                </div>
                <div class="campo">
                    <label for="entry_ubicacion"><i class="fas fa-location-dot"></i> Ubicación</label>
                    <input type="text" id="entry_ubicacion" placeholder="Ubicación">
                </div>
                <div class="campo">
                    <label for="entry_nivel"><i class="fas fa-chart-bar"></i> Nivel de contaminación</label>
                    <input type="text" id="entry_nivel" placeholder="bajo / medio / alto / critico">
                </div>
                <div class="campo campo-doble">
                    <label for="entry_descripcion"><i class="fas fa-align-left"></i> Descripción</label>
                    <input type="text" id="entry_descripcion" placeholder="Descripción de la zona">
                </div>
            </div>
        </section>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2><i class="fas fa-list" style="color: #5BC0A8; margin-right: 8px;"></i>Zonas registradas</h2>
                <div class="bloque-btns">
                    <button id="btnBuscar" class="btn-primario">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button id="btnBorrar" class="btn-borrar-id">
                        <i class="fas fa-trash"></i> Borrar por ID
                    </button>
                </div>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaZonas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Ubicación</th>
                            <th>Contaminación</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyZonas"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 zona(s) registrada(s)</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/auth-guard.js"></script>
</body>
</html>
