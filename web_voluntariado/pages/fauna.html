<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauna Afectada - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/fauna.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="errorAlert" class="error-alert hidden">
        <span>✕</span>
        <span id="errorText">Error</span>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="logo-circle">🐢</div>
            <div class="header-text">
                <h1>Fauna Afectada</h1>
                <p>Sistema de monitoreo costero · Módulo de fauna marina</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-registrar" id="btnRegistrar">
                <i class="fas fa-plus"></i> Registrar
            </button>
            <button class="btn btn-editar" id="btnEditar">
                <i class="fas fa-pencil-alt"></i> Editar
            </button>
            <button class="btn btn-buscar" id="btnBuscar">
                <i class="fas fa-search"></i> Buscar ID
            </button>
            <button class="btn btn-limpiar" id="btnLimpiar">
                <i class="fas fa-broom"></i> Limpiar
            </button>
            <button class="btn btn-salir" id="btnSalir">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <section class="form-card">
        <div class="form-header">
            <span class="icon-fauna"><i class="fas fa-fish"></i></span>
            <span>Información del animal</span>
        </div>
        <form id="faunaForm" onsubmit="return false;">
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-fingerprint"></i> ID Animal</label>
                    <input type="text" id="entry_id" placeholder="Ej: 45">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-paw"></i> Especie</label>
                    <input type="text" id="entry_especie" placeholder="Ej: tortuga, pez">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-heartbeat"></i> Estado</label>
                    <input type="text" id="entry_estado" placeholder="vivo / herido / muerto">
                </div>
                <div class="form-group form-group-doble">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <input type="text" id="entry_descripcion" placeholder="Descripción del estado">
                </div>
            </div>
        </form>
    </section>

    <section class="table-section">
        <div class="table-header">
            <div class="table-title">
                <i class="fas fa-list-alt"></i>
                <span>Animales registrados</span>
            </div>
            <div class="table-actions">
                <button class="btn-borrar-id" id="btnBorrar">
                    <i class="fas fa-trash-alt"></i> Borrar por ID
                </button>
            </div>
        </div>

        <table class="data-table" id="tablaFauna">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Especie</th>
                    <th>Estado</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody id="tbodyFauna"></tbody>
        </table>

        <div class="table-footer">
            <span id="lblFooter">Mostrando 0 animal(es) registrado(s)</span>
            <span class="turtle-icon">🐢</span>
        </div>
    </section>

    <div id="messageBox" class="hidden"></div>

    <script src="../assets/js/fauna.js"></script>
</body>
</html>
