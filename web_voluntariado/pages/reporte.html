<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte General - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/reporte.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <h1>Reporte General</h1>
            <p>Sistema de monitoreo costero · Resumen de impacto ambiental</p>
        </div>
        <div class="bloque-btns">
            <button id="btnGenerar" class="btn-primario">Generar Reporte</button>
            <button id="btnLimpiar" class="btn-outline">Limpiar</button>
            <button id="btnSalir" class="btn-outline">Salir</button>
        </div>
    </header>

    <main class="contenedor">
        <section class="resumen">
            <div class="tarjeta">
                <h3>TOTAL BASURA</h3>
                <p id="lblTotal">0.00 kg</p>
            </div>
            <div class="tarjeta">
                <h3>PROMEDIO</h3>
                <p id="lblPromedio">0.00 kg</p>
            </div>
            <div class="tarjeta">
                <h3>ANIMALES AFECTADOS</h3>
                <p id="lblAnimales">0</p>
            </div>
        </section>

        <div class="separador"></div>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2>RESIDUOS POR TIPO</h2>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaReporte">
                    <thead>
                        <tr>
                            <th>Tipo de Residuo</th>
                            <th>Peso Total (kg)</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyReporte"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Presione 'Generar Reporte' para cargar los datos.</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/reporte.js"></script>
    <script src="../../login/js/auth-guard.js"></script>
</body>
</html>
