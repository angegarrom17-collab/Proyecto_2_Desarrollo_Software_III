<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Voluntarios</title>
    <link rel="stylesheet" href="../assets/css/voluntarios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="errorAlert" class="error-alert hidden">
        <span>✕</span>
        <span id="errorText">Error</span>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="logo-circle">🐟</div>
            <div class="header-text">
                <h1>Registro de Voluntarios</h1>
                <p>Sistema de voluntariado · Módulo de voluntarios</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-registrar" onclick="registrarVoluntario()">
                <i class="fas fa-plus"></i> Registrar
            </button>
            <button class="btn btn-editar" onclick="editarVoluntario()">
                <i class="fas fa-pencil-alt"></i> Editar
            </button>
            <button class="btn btn-eliminar" onclick="eliminarVoluntario()">
                <i class="fas fa-trash-alt"></i> Eliminar
            </button>
            <button class="btn btn-limpiar" onclick="limpiarFormulario()">
                <i class="fas fa-broom"></i> Limpiar
            </button>
            <button class="btn btn-salir" onclick="if(confirm('¿Desea salir del módulo de voluntarios?')) window.location.href='../index.html'">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <section class="form-card">
        <div class="form-header">
            <span class="icon-user"><i class="fas fa-user-circle"></i></span>
            <span>Información del voluntario</span>
        </div>
        <form id="voluntarioForm" onsubmit="return false;">
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Identificador (ID)</label>
                    <input type="number" id="id" placeholder="Ej: 85099" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Nombre del voluntario" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono de Contacto</label>
                    <input type="text" id="telefono" placeholder="Teléfono" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Edad</label>
                    <input type="number" id="edad" placeholder="Mayor de 18" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Organización / Institución</label>
                    <input type="text" id="organizacion" placeholder="Organización" required>
                </div>
            </div>
        </form>
    </section>

    <section class="table-section">
        <div class="table-header">
            <div class="table-title">
                <i class="fas fa-users"></i>
                <span>Voluntarios registrados</span>
            </div>
            <div class="table-actions">
                <button class="btn-buscar-solo" onclick="buscarVoluntario()">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NOMBRE</th>
                    <th>TELÉFONO</th>
                    <th>EDAD</th>
                    <th>CORREO</th>
                    <th>ORGANIZACIÓN</th>
                </tr>
            </thead>
            <tbody id="voluntariosTable"></tbody>
        </table>

        <div class="table-footer">
            <span>Mostrando <span id="contador">0</span> registro(s)</span>
            <span class="heart-icon">♥</span>
        </div>
    </section>

    <div id="messageBox" class="hidden"></div>

    <script src="../assets/js/voluntarios.js"></script>
</body>
</html>
