<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Voluntarios - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/voluntarios.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <h1>Registro de Voluntarios</h1>
            <p>Sistema de voluntariado · Módulo de voluntarios</p>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">Registrar</button>
            <button id="btnEditar" class="btn-secundario">Editar</button>
            <button id="btnEliminar" class="btn-outline">Eliminar por ID</button>
            <button id="btnLimpiar" class="btn-outline">Limpiar</button>
            <button id="btnSalir" class="btn-outline">Salir</button>
        </div>
    </header>

    <main class="contenedor">
        <section class="formulario">
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id">IDENTIFICADOR (ID)</label>
                    <input type="text" id="entry_id" placeholder="Ej: 85099">
                </div>
                <div class="campo">
                    <label for="entry_nombre">NOMBRE COMPLETO</label>
                    <input type="text" id="entry_nombre" placeholder="Nombre del voluntario">
                </div>
                <div class="campo">
                    <label for="entry_telefono">TELÉFONO DE CONTACTO</label>
                    <input type="text" id="entry_telefono" placeholder="Teléfono">
                </div>
                <div class="campo">
                    <label for="entry_edad">EDAD</label>
                    <input type="text" id="entry_edad" placeholder="Mayor de 18">
                </div>
                <div class="campo">
                    <label for="entry_correo">CORREO ELECTRÓNICO</label>
                    <input type="email" id="entry_correo" placeholder="correo@ejemplo.com">
                </div>
                <div class="campo">
                    <label for="entry_organizacion">ORGANIZACIÓN / INSTITUCIÓN</label>
                    <input type="text" id="entry_organizacion" placeholder="Organización">
                </div>
            </div>
        </section>

        <div class="separador"></div>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2>VOLUNTARIOS REGISTRADOS</h2>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaVoluntarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Edad</th>
                            <th>Correo</th>
                            <th>Organización</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyVoluntarios"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 registro(s)</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/voluntarios.js"></script>
</body>
</html>
