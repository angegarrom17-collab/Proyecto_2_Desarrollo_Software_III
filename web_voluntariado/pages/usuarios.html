<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/usuarios.css">
<base target="_blank">
</head>
<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="bloque-texto">
            <h1>Gestión de Usuarios</h1>
            <p>Sistema administrativo · Módulo de acceso</p>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">Registrar</button>
            <button id="btnEditar" class="btn-secundario">Editar</button>
            <button id="btnLimpiar" class="btn-outline">Limpiar</button>
            <button id="btnSalir" class="btn-outline">Salir</button>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="contenedor">
        <!-- Formulario -->
        <section class="formulario">
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id">ID</label>
                    <input type="text" id="entry_id" placeholder="Ej: 11937">
                </div>
                <div class="campo">
                    <label for="entry_nombre">NOMBRE COMPLETO</label>
                    <input type="text" id="entry_nombre" placeholder="Nombre del usuario">
                </div>
                <div class="campo">
                    <label for="entry_correo">CORREO ELECTRÓNICO</label>
                    <input type="email" id="entry_correo" placeholder="correo@ejemplo.com">
                </div>
                <div class="campo">
                    <label for="entry_contrasena">CONTRASEÑA</label>
                    <input type="password" id="entry_contrasena" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="campo">
                    <label for="entry_tipo">TIPO DE USUARIO</label>
                    <input type="text" id="entry_tipo" placeholder="encargado" value="encargado">
                </div>
            </div>
        </section>

        <!-- Separador -->
        <div class="separador"></div>

        <!-- Tabla -->
        <section class="tabla-section">
            <div class="tabla-header">
                <h2>USUARIOS REGISTRADOS</h2>
                <button id="btnBorrar" class="btn-borrar-id">Borrar por ID</button>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyUsuarios">
                        <!-- Se llena dinámicamente -->
                    </tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 registro(s)</p>
        </section>
    </main>

    <!-- Mensajes -->
    <div id="messageBox" class="message-box hidden"></div>

    <script src="../assets/js/usuarios.js"></script>
</body>
</html>
