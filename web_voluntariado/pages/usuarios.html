<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/usuarios.css">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <div class="titulo-con-icono">
                <span class="icono-titulo">⚓</span>
                <div>
                    <h1>Gestión de Usuarios</h1>
                    <p>Sistema administrativo · Módulo de acceso</p>
                </div>
            </div>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">
                <i class="fas fa-plus"></i> Registrar
            </button>
            <button id="btnEditar" class="btn-secundario">
                <i class="fas fa-edit"></i> Editar
            </button>
            <button id="btnLimpiar" class="btn-outline">
                <i class="fas fa-eraser"></i> Limpiar
            </button>
            <button id="btnSalir" class="btn-outline">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <main class="contenedor">
        <section class="formulario card">
            <div class="card-title">
                <i class="fas fa-user-plus" style="color: #1976d2;"></i>
                Información del usuario
            </div>
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id"><i class="fas fa-id-card"></i> Identificador (ID)</label>
                    <input type="text" id="entry_id" placeholder="Ej: 101010101">
                </div>
                <div class="campo">
                    <label for="entry_nombre"><i class="fas fa-user"></i> Nombre completo</label>
                    <input type="text" id="entry_nombre" placeholder="Nombre del usuario">
                </div>
                <div class="campo">
                    <label for="entry_correo"><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="entry_correo" placeholder="correo@ejemplo.com">
                </div>
                <div class="campo">
                    <label for="entry_contrasena"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="entry_contrasena" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="campo">
                    <label for="entry_tipo"><i class="fas fa-user-tag"></i> Tipo de usuario</label>
                    <select id="entry_tipo">
                        <option value="encargado">Encargado</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2><i class="fas fa-users" style="color: #1976d2; margin-right: 8px;"></i>Usuarios registrados</h2>
                <div class="bloque-btns">
                    <button id="btnBuscar" class="btn-primario">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button id="btnBorrar" class="btn-borrar-id">
                        <i class="fas fa-trash"></i> Borrar por ID
                    </button>
                </div>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyUsuarios"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 registro(s)</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/usuarios.js"></script>
</body>
</html>
