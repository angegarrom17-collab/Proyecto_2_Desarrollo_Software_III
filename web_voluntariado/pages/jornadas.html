<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornadas de Limpieza - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/jornadas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="errorAlert" class="error-alert hidden">
        <span>✕</span>
        <span id="errorText">Error</span>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="logo-circle">🌊</div>
            <div class="header-text">
                <h1>Jornadas de Limpieza</h1>
                <p>Sistema de monitoreo costero · Módulo de jornadas</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-registrar" id="btnRegistrar">
                <i class="fas fa-plus"></i> Registrar
            </button>
            <button class="btn btn-editar" id="btnEditar">
                <i class="fas fa-pencil-alt"></i> Editar
            </button>
            <button class="btn btn-eliminar" id="btnBorrar">
                <i class="fas fa-trash-alt"></i> Eliminar
            </button>
            <button class="btn btn-limpiar" id="btnLimpiar">
                <i class="fas fa-broom"></i> Limpiar
            </button>
            <button class="btn btn-reporte" id="btnReporte">
                <i class="fas fa-chart-bar"></i> Reporte
            </button>
            <button class="btn btn-salir" id="btnSalir">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <section class="form-card">
        <div class="form-header">
            <span class="icon-jornada"><i class="fas fa-clipboard-list"></i></span>
            <span>Información de la jornada</span>
        </div>
        <form id="jornadaForm" onsubmit="return false;">
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-fingerprint"></i> ID Jornada</label>
                    <input type="text" id="entry_id" placeholder="Ej: J001">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Fecha</label>
                    <input type="text" id="entry_fecha" placeholder="DD-MM">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <input type="text" id="entry_descripcion" placeholder="Descripción de la jornada">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-weight-hanging"></i> Basura (kg)</label>
                    <input type="text" id="entry_basura" placeholder="Número entero">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-eye"></i> Observaciones</label>
                    <input type="text" id="entry_obs" placeholder="Observaciones">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Zona</label>
                    <select id="entry_zona">
                        <option value="">-- Seleccione una zona --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Cant. Voluntarios</label>
                    <input type="text" id="entry_voluntarios" placeholder="Número entero (opcional)">
                </div>
            </div>
        </form>
    </section>

    <section class="table-section">
        <div class="table-header">
            <div class="table-title">
                <i class="fas fa-list-alt"></i>
                <span>Jornadas registradas</span>
            </div>
        </div>

        <table class="data-table" id="tablaJornadas">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Descripción</th>
                    <th>Basura (kg)</th>
                    <th>Voluntarios</th>
                </tr>
            </thead>
            <tbody id="tbodyJornadas"></tbody>
        </table>

        <div class="table-footer">
            <span>Mostrando <span id="lblFooter">0</span> registro(s)</span>
            <span class="wave-icon">🌊</span>
        </div>
    </section>

    <div id="messageBox" class="hidden"></div>

    <script src="../assets/js/jornadas.js"></script>
    <script src="../../login/js/auth-guard.js"></script>
</body>
</html>
