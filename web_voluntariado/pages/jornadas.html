<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornadas de Limpieza - Sistema de Monitoreo Costero</title>
    <link rel="stylesheet" href="../assets/css/jornadas.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <h1>Jornadas de Limpieza</h1>
            <p>Sistema de monitoreo costero · Módulo de jornadas</p>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">Registrar</button>
            <button id="btnEditar" class="btn-secundario">Editar</button>
            <button id="btnLimpiar" class="btn-outline">Limpiar</button>
            <button id="btnReporte" class="btn-outline">Ver Reporte</button>
            <button id="btnSalir" class="btn-outline">Salir</button>
        </div>
    </header>

    <main class="contenedor">
        <section class="formulario">
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id">ID JORNADA</label>
                    <input type="text" id="entry_id" placeholder="Ej: 111">
                </div>
                <div class="campo">
                    <label for="entry_fecha">FECHA</label>
                    <input type="text" id="entry_fecha" placeholder="DD-MM">
                </div>
                <div class="campo">
                    <label for="entry_descripcion">DESCRIPCIÓN</label>
                    <input type="text" id="entry_descripcion" placeholder="Descripción de la jornada">
                </div>
                <div class="campo">
                    <label for="entry_basura">CANTIDAD BASURA (kg)</label>
                    <input type="text" id="entry_basura" placeholder="Número entero">
                </div>
                <div class="campo">
                    <label for="entry_obs">OBSERVACIONES</label>
                    <input type="text" id="entry_obs" placeholder="Observaciones">
                </div>
                <div class="campo">
                    <label for="entry_zona">ID ZONA</label>
                    <input type="text" id="entry_zona" placeholder="ID de zona existente">
                </div>
                <div class="campo">
                    <label for="entry_voluntarios">CANTIDAD VOLUNTARIOS</label>
                    <input type="text" id="entry_voluntarios" placeholder="Número entero">
                </div>
            </div>
        </section>

        <div class="separador"></div>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2>JORNADAS REGISTRADAS</h2>
                <button id="btnBorrar" class="btn-borrar-id">Borrar por ID</button>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaJornadas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Descripción</th>
                            <th>Basura (kg)</th>
                            <th>Voluntarios</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyJornadas"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 registro(s)</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/jornadas.js"></script>
</body>
</html>
