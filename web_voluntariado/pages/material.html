<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Materiales - Sistema de Monitoreo Costero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Nunito:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/material.css">
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="bloque-texto">
            <span class="mascota-wrap">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
                    <path d="M12 2.2 21 7v10L12 21.8 3 17V7l9-4.8z" opacity="0.95"/>
                    <path d="M12 2.2 21 7l-9 4.7L3 7l9-4.8z" fill="#fff" opacity="1"/>
                    <path d="M12 11.7v10.1L3 17V7l9 4.7z" fill="#ffffff" opacity="0.78"/>
                    <path d="M12 11.7v10.1l9-4.8V7l-9 4.7z" fill="#ffffff" opacity="0.6"/>
                </svg>
            </span>
            <div>
                <h1>Gestión de Materiales</h1>
                <p>Sistema de voluntariado · Módulo de inventario</p>
            </div>
        </div>
        <div class="bloque-btns">
            <button id="btnRegistrar" class="btn-primario">+ Registrar</button>
            <button id="btnEditar" class="btn-secundario">✎ Editar</button>
            <button id="btnUsar" class="btn-outline">⤓ Usar Material</button>
            <button id="btnLimpiar" class="btn-outline">⟲ Limpiar</button>
            <button id="btnSalir" class="btn-outline">Salir</button>
        </div>
    </header>

    <div class="ola"></div>

    <main class="contenedor">
        <section class="formulario">
            <div class="titulo-form">
                <span class="icono-badge">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M12 2.2 21 7v10L12 21.8 3 17V7l9-4.8z"/></svg>
                </span>
                Datos del material
            </div>
            <div class="grupo-campos">
                <div class="campo">
                    <label for="entry_id">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zM7 16H5v-2h2v2zm0-4H5v-2h2v2zm5 4H9v-2h3v2zm5-4h-7v-2h7v2z"/></svg>
                        ID Material
                    </label>
                    <input type="text" id="entry_id" placeholder="Ej: 2">
                </div>
                <div class="campo">
                    <label for="entry_nombre">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 7h-3.17L15 4.84A2 2 0 0013.46 4h-2.92a2 2 0 00-1.54.84L7.17 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm-8 9.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z"/></svg>
                        Nombre
                    </label>
                    <input type="text" id="entry_nombre" placeholder="Nombre del material">
                </div>
                <div class="campo">
                    <label for="entry_unidad">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21.41 11.41L12.59 2.59A2 2 0 0011.17 2H4a2 2 0 00-2 2v7.17a2 2 0 00.59 1.41l8.82 8.83a2 2 0 002.83 0l7.17-7.17a2 2 0 000-2.83zM6.5 8A1.5 1.5 0 118 6.5 1.5 1.5 0 016.5 8z"/></svg>
                        Unidad de medida
                    </label>
                    <input type="text" id="entry_unidad" placeholder="Ej: p, kg, unidad">
                </div>
                <div class="campo">
                    <label for="entry_cantidad">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 00-2 2v16a2 2 0 002 2h16a2 2 0 002-2V4a2 2 0 00-2-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-8v-2h8v2zm0-4h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>
                        Cantidad disponible
                    </label>
                    <input type="text" id="entry_cantidad" placeholder="Número entero">
                </div>
            </div>
        </section>

        <div class="separador"></div>

        <section class="tabla-section">
            <div class="tabla-header">
                <h2>
                    <span class="icono-badge">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M20 8H4a2 2 0 00-2 2v8a2 2 0 002 2h16a2 2 0 002-2v-8a2 2 0 00-2-2zm-9 7H6v-2h5v2zm7-3h-7v-2h7v2zM7 7V5a2 2 0 012-2h6a2 2 0 012 2v2h-2V5H9v2H7z"/></svg>
                    </span>
                    Materiales registrados
                </h2>
                <button id="btnBorrar" class="btn-borrar-id">🗑 Borrar por ID</button>
            </div>
            <div class="tabla-contenedor">
                <table id="tablaMateriales">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Unidad</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyMateriales"></tbody>
                </table>
            </div>
            <p id="lblFooter" class="footer-tabla">Mostrando 0 material(es) en inventario</p>
        </section>
    </main>

    <div id="messageBox" class="message-box hidden"></div>
    <script src="../assets/js/auth-guard.js"></script>
</body>
</html>
